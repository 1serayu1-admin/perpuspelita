</head>
<body>
    <h1>Minimal Signup Test</h1>
    <button onclick="testSignup()">Test Signup</button>
    <div id="result"></div>

    <script>
        const { createClient } = supabase;
        const supabase = createClient(
            'https://lavlemqycumxlhoxexdi.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxhdmxlbXF5Y3VteGxob3hleGRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjMyNDUsImV4cCI6MjA4ODEzOTI0NX0.vfjJHfd76qB-3Z0N9b82u94_ZkyETs8eht_h8hAC9EM'
        );

        async function testSignup() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';

            try {
                console.log('Starting signup test...');
                
                const { data, error } = await supabase.auth.signUp({
                    email: 'test' + Date.now() + '@example.com',
                    password: 'password123'
                });

                console.log('Signup result:', { data, error });

                if (error) {
                    resultDiv.innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
                    console.error('Full error:', error);
                } else {
                    resultDiv.innerHTML = `<p style="color: green;">✅ Success! User created.</p>`;
                    console.log('Success:', data);
                }
            } catch (err) {
                resultDiv.innerHTML = `<p style="color: red;">💥 Exception: ${err.message}</p>`;
                console.error('Exception:', err);
            }
        }

        // Also test environment detection
        console.log('Environment check:');
        console.log('Supabase URL:', 'https://lavlemqycumxlhoxexdi.supabase.co');
        console.log('Anon key length:', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxhdmxlbXF5Y3VteGxob3hleGRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjMyNDUsImV4cCI6MjA4ODEzOTI0NX0.vfjJHfd76qB-3Z0N9b82u94_ZkyETs8eht_h8hAC9EM'.length);
